<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Julalak's Artwork Gallery">
    <title>Julayourluck - Arting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/arting.css">
</head>

<body>
    <div class="container">
        <main class="gallery-container">
            <header class="page-header">
                <a href="../index.html" class="back-button">< Back</a>
                <h1>My Artworks</h1>
            </header>

            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="digital">Digital</button>
                <button class="filter-btn" data-filter="traditional">Traditional</button>
                <button class="filter-btn" data-filter="sketches">Sketches</button>
            </div>

            <div class="gallery-grid">
                <!-- Example artwork items -->
                <div class="art-item" data-category="digital">
                    <img src="../assets/20230120_2.png" alt="Digital Artwork 1">
                    <div class="art-info">
                        <h3>Love this style!</h3>
                        <p>Digital Art • 2024</p>
                    </div>
                </div>
                <!-- More art items will be added here -->
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2025 Julalak Kinnara. All rights reserved.</p>
    </footer>

    <script src="../js/arting.js"></script>
</body>

</html>
