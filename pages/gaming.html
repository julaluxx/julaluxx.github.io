<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Julalak's Game Development">
    <title>Julayourluck - Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/gaming.css">
</head>

<body>
    <div class="container">
        <main class="gaming-container">
            <header class="page-header">
                <a href="../index.html" class="back-button">< Back</a>
                <h1>My Games</h1>
            </header>

            <div class="games-showcase">
                <!-- Featured Game -->
                <section class="featured-game">
                    <div class="game-preview">
                        <img src="../assets/placeholder-game.png" alt="Featured Game Screenshot">
                        <div class="game-overlay">
                            <a href="#" class="play-button">Play Now</a>
                        </div>
                    </div>
                    <div class="game-info">
                        <h2>Featured Game Title</h2>
                        <p class="game-description">An exciting adventure game where players explore mysterious worlds...</p>
                        <div class="game-meta">
                            <span class="genre">Adventure</span>
                            <span class="platform">Web Browser</span>
                            <span class="status">Released</span>
                        </div>
                    </div>
                </section>

                <!-- Other Games Grid -->
                <div class="games-grid">
                    <!-- Example Game Card -->
                    <article class="game-card">
                        <div class="game-thumbnail">
                            <img src="../assets/placeholder-game-thumb.png" alt="Game Thumbnail">
                            <div class="game-overlay">
                                <a href="#" class="play-button">Play</a>
                            </div>
                        </div>
                        <div class="game-details">
                            <h3>Game Title</h3>
                            <div class="game-tags">
                                <span class="tag">Puzzle</span>
                                <span class="tag">2D</span>
                            </div>
                            <p class="game-brief">Short description of the game...</p>
                        </div>
                    </article>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2025 Julalak Kinnara. All rights reserved.</p>
    </footer>

    <script src="./gaming.js"></script>
</body>

</html>
